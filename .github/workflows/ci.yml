# CI workflow for the trusty-tools Cargo workspace.
#
# Jobs:
#   fmt    – cargo fmt --all --check (stable)
#   clippy – cargo clippy --workspace --all-targets -D warnings (stable, SKIP_UI_BUILD=1)
#   test   – cargo test --workspace (stable, SKIP_UI_BUILD=1, full clone for git tests)
#   msrv   – cargo check --workspace (toolchain 1.91, SKIP_UI_BUILD=1)
#
# trusty-mpm-gui is excluded from all jobs: it is a Tauri desktop GUI
# (publish = false) that requires WebKit2GTK on Linux (~100 MB apt chain).
# It is not a deployable service and cannot be meaningfully validated in a
# headless CI runner. Exclude it via --exclude trusty-mpm-gui on every
# cargo invocation.
#
# SKIP_UI_BUILD=1 is set globally: the four crates with build.rs Svelte
# pipelines (trusty-search, trusty-memory, trusty-analyze, trusty-agents) skip
# pnpm when this env var is set. The committed ui-dist/ artefacts embedded
# via include_dir!/include_str! are sufficient for compilation.
#
# FASTEMBED MODEL CACHE (issue #865): the test job pre-seeds the
# AllMiniLML6V2Q ONNX model (Xenova/all-MiniLM-L6-v2, ~22 MB) into
# ~/.cache/fastembed before cargo test runs, and preserves the populated
# directory in the Actions cache keyed on Cargo.lock. This eliminates the
# intermittent HTTP 429 failures from HuggingFace that were causing ~31
# trusty-memory tests to fail spuriously on cold runners.
#
# The 7 env-sensitive trusty-memory tests (project_slug_returns_none_without_markers,
# project_slug_at_returns_none_without_markers, cwd_palace_slug_falls_back_to_basename,
# palace_slug_from_stdin_cwd_uses_stdin_path, resolve_palace_for_log_prefers_stdin_cwd,
# prompt_context_recall_filters_deny_tags, prompt_context_recalls_palace_drawers) fail
# on developer machines because tempfile::tempdir() creates dirs under a path that is
# itself inside the trusty-tools git worktree, causing find_project_root to return a
# non-None value. On the CI runner /tmp is a clean filesystem with no git ancestor, so
# these tests are expected to pass. They are NOT excluded here; if they go red in CI
# that is a real bug and should block the PR.
#
# trusty-agents git tests (git::branch::tests::list_branches_includes_current,
# git::log::tests::search_commits_finds_known_keyword) require a full git clone
# with local branch refs and commit history. The test job uses fetch-depth: 0
# to ensure a full (non-shallow) clone is present.
#
# MSRV NOTE: the effective MSRV is 1.91, declared as [workspace.package]
# rust-version = "1.91" in the root Cargo.toml. It is driven by indirect
# aws-sdk-* / aws-smithy-* crates that declare rust-version = "1.91.1". The
# msrv job below pins dtolnay/rust-toolchain@1.91 to enforce this floor.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# SKIP_UI_BUILD=1 prevents the four build.rs Svelte pipelines from invoking pnpm.
env:
  SKIP_UI_BUILD: "1"
  CARGO_TERM_COLOR: always
  # Reduce noise from ort/fastembed download progress bars.
  RUST_LOG: "warn"

jobs:
  # --------------------------------------------------------------------------
  # fmt: enforce cargo fmt --all --check (stable toolchain + rustfmt component)
  # --------------------------------------------------------------------------
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install stable toolchain with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      # Note: rustfmt.toml uses imports_granularity and group_imports which are
      # nightly-only; stable rustfmt silently ignores them (emits warnings, exit 0).
      # The format check itself is not affected.
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  # --------------------------------------------------------------------------
  # clippy: deny warnings across the whole workspace (stable, all targets)
  # trusty-mpm-gui excluded: Tauri desktop GUI, needs WebKit2GTK on Linux.
  # --------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /usr/local/share/powershell \
            /usr/share/swift "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force || true
          echo "After:"; df -h /

      - name: Install stable toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Separate cache key per job so fmt/clippy/test/msrv don't fight
          # over incompatible target directories.
          key: clippy

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets --exclude trusty-mpm-gui -- -D warnings

  # --------------------------------------------------------------------------
  # test: run all unit + integration tests (stable, no --include-ignored).
  # ONNX-backed tests are #[ignore]-tagged; they are intentionally skipped here
  # because they require model downloads and a running embedderd daemon.
  # trusty-mpm-gui excluded: see clippy note above.
  # fetch-depth: 0 (full clone) required for trusty-agents git tests that inspect
  # local branch refs and search commit history.
  #
  # FASTEMBED MODEL CACHING (issue #865):
  # trusty-memory tests initialise FastEmbedder which downloads the
  # AllMiniLML6V2Q ONNX model from HuggingFace (Xenova/all-MiniLM-L6-v2,
  # ~22 MB). Cold CI runners concurrently fetch this file and hit HF's
  # HTTP 429 rate-limit, causing ~31 tests to fail spuriously.
  #
  # Fix: two-stage approach.
  #   1. Restore the model from the Actions cache keyed on the fastembed
  #      version (from Cargo.lock) + model repo IDs. On a cache hit the
  #      runner never contacts HuggingFace at all.
  #   2. On a cache miss, pre-seed the model BEFORE cargo test runs,
  #      using a retried curl download with exponential backoff (5 attempts,
  #      up to ~120 s total). One controlled download per cold runner is far
  #      more reliable than N concurrent in-test downloads.
  #
  # The model is stored under FASTEMBED_CACHE_DIR (~/.cache/fastembed on the
  # runner) using hf-hub's layout:
  #   models--Xenova--all-MiniLM-L6-v2/
  #     refs/main          <- snapshot hash pointer
  #     snapshots/<hash>/  <- model files (onnx/, tokenizer.json, …)
  #     blobs/<sha256>     <- actual content-addressed objects
  #
  # We cache the entire FASTEMBED_CACHE_DIR so any additional tokeniser /
  # config files pulled by fastembed are also captured.
  # --------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Point fastembed (and hf-hub) at a stable, writable path so the
      # actions/cache key can target it precisely. This env var is honoured
      # natively by fastembed-rs via get_cache_dir() and also by the
      # resolve_fastembed_cache_dir() helper in trusty-common.
      FASTEMBED_CACHE_DIR: /home/runner/.cache/fastembed
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Free disk space
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /usr/local/share/powershell \
            /usr/share/swift "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force || true
          echo "After:"; df -h /

      # trusty-agents's git tests (list_branches_includes_current) assert that the
      # local branch list includes "main". GitHub Actions PR checkouts only create
      # a local branch for the PR head; "main" is only a remote ref unless we
      # explicitly create a local tracking branch for it.
      - name: Create local main branch for git tests
        run: git fetch origin main:main || true

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: test

      # Restore the fastembed ONNX model cache (issue #865).
      #
      # Cache key: fastembed crate version (from Cargo.lock) + the two model
      # repo IDs used by this workspace:
      #   - Xenova/all-MiniLM-L6-v2  (AllMiniLML6V2Q — primary, ~22 MB)
      #   - Qdrant/all-MiniLM-L6-v2-onnx (AllMiniLML6V2 — CPU fallback, ~86 MB)
      # Changing any of these (e.g. upgrading fastembed) rotates the key so
      # the old model blobs are not served to the new version.
      - name: Restore fastembed model cache
        id: fastembed-cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/fastembed
          key: fastembed-v${{ hashFiles('Cargo.lock') }}-xenova-allminilm-l6-v2-qdrant-allminilm-l6-v2-onnx

      # Pre-seed the model on a cache miss so tests never hit HuggingFace
      # concurrently (the root cause of the HTTP 429 flake). Uses hf-hub's
      # CLI-friendly URL pattern with exponential backoff: 5 attempts, waiting
      # 5, 10, 20, 40 seconds between retries. After a successful download the
      # actions/cache post-step saves the populated directory for future runs.
      #
      # Primary model: Xenova/all-MiniLM-L6-v2 at the pinned snapshot.
      # The refs/main pointer, tokenizer files, and the quantized ONNX are
      # all needed for fastembed initialisation.
      - name: Pre-seed fastembed models (cache miss only)
        if: steps.fastembed-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          CACHE_DIR="${FASTEMBED_CACHE_DIR}"
          mkdir -p "${CACHE_DIR}"

          # ── Retry helper ──────────────────────────────────────────────────
          # curl_retry <url> <dest>
          # 5 attempts, starting with 5 s back-off, doubling each time.
          curl_retry() {
            local url="$1" dest="$2" attempt=1 max=5 wait=5
            until curl -fsSL --retry 0 -o "${dest}" "${url}"; do
              if [ "${attempt}" -ge "${max}" ]; then
                echo "ERROR: download failed after ${max} attempts: ${url}" >&2
                return 1
              fi
              echo "Download failed (attempt ${attempt}/${max}), retrying in ${wait}s …"
              sleep "${wait}"
              attempt=$(( attempt + 1 ))
              wait=$(( wait * 2 ))
            done
          }

          # ── Xenova/all-MiniLM-L6-v2 (AllMiniLML6V2Q — primary model) ────
          # hf-hub resolves the model at the revision pinned in refs/main.
          # We download the refs/main pointer first, then the exact snapshot.
          HF_BASE="https://huggingface.co"
          XENOVA_REPO="Xenova/all-MiniLM-L6-v2"
          XENOVA_DIR="${CACHE_DIR}/models--Xenova--all-MiniLM-L6-v2"

          mkdir -p "${XENOVA_DIR}/refs" "${XENOVA_DIR}/blobs"

          # Resolve current HEAD commit for the model repo.
          echo "Resolving Xenova/all-MiniLM-L6-v2 HEAD revision …"
          XENOVA_REV=$(curl -fsSL \
            "${HF_BASE}/${XENOVA_REPO}/resolve/main/onnx/model_quantized.onnx" \
            -o /dev/null -w '%{url_effective}' | grep -oP '(?<=/resolve/)[^/]+' || true)

          # Fallback: query the HF API for the main branch commit hash.
          if [ -z "${XENOVA_REV}" ] || [ "${XENOVA_REV}" = "main" ]; then
            XENOVA_REV=$(curl -fsSL \
              "https://huggingface.co/api/models/${XENOVA_REPO}?full=false" \
              | grep -oP '"sha":"[^"]{40}"' | head -1 | grep -oP '[0-9a-f]{40}' || true)
          fi

          # If we still have no revision, use the well-known pinned hash from
          # the developer's local cache (matches fastembed 5.13.4).
          XENOVA_REV="${XENOVA_REV:-751bff37182d3f1213fa05d7196b954e230abad9}"
          echo "Using Xenova/all-MiniLM-L6-v2 revision: ${XENOVA_REV}"

          echo "${XENOVA_REV}" > "${XENOVA_DIR}/refs/main"
          SNAP_DIR="${XENOVA_DIR}/snapshots/${XENOVA_REV}"
          mkdir -p "${SNAP_DIR}/onnx"

          # Download required files for AllMiniLML6V2Q initialisation.
          for FILE in tokenizer.json tokenizer_config.json special_tokens_map.json config.json; do
            DEST="${SNAP_DIR}/${FILE}"
            if [ ! -f "${DEST}" ]; then
              echo "Downloading ${XENOVA_REPO}/${FILE} …"
              curl_retry \
                "${HF_BASE}/${XENOVA_REPO}/resolve/${XENOVA_REV}/${FILE}" \
                "${DEST}"
            fi
          done

          ONNX_DEST="${SNAP_DIR}/onnx/model_quantized.onnx"
          if [ ! -f "${ONNX_DEST}" ]; then
            echo "Downloading ${XENOVA_REPO}/onnx/model_quantized.onnx (~22 MB) …"
            curl_retry \
              "${HF_BASE}/${XENOVA_REPO}/resolve/${XENOVA_REV}/onnx/model_quantized.onnx" \
              "${ONNX_DEST}"
          fi

          echo "fastembed model pre-seed complete."
          du -sh "${CACHE_DIR}" || true

      - name: cargo test --workspace
        # Unset CI so trusty-common's update::check_throttled runs the
        # cache-freshness code path. The function returns None immediately
        # when CI is non-empty; tests like cache_fresh_returns_some_when_newer
        # expect the cache path (is_some), which requires CI to be unset.
        # We set CI="" here to shadow the global CI=true injected by the runner.
        env:
          CI: ""
        run: cargo test --workspace --exclude trusty-mpm-gui

      # Explicit per-crate step so trusty-review failures are individually
      # attributed in the GitHub Actions UI (closes #950).
      - name: cargo test -p trusty-review
        env:
          CI: ""
        run: cargo test -p trusty-review

  # --------------------------------------------------------------------------
  # msrv: verify the workspace compiles on the effective MSRV.
  # cargo check is used (not test) to keep this job fast: the MSRV guarantee
  # is that the code *compiles* on the minimum toolchain, not that tests pass.
  # trusty-mpm-gui excluded: see clippy note above.
  #
  # Toolchain is 1.91, matching [workspace.package].rust-version = "1.91" in the
  # root Cargo.toml. The current Cargo.lock pulls aws-sdk-*/aws-smithy-* at
  # versions that require rustc >= 1.91.1, which sets the effective MSRV. This
  # job pins the toolchain to that floor so the workspace is guaranteed to
  # compile on the declared minimum.
  # --------------------------------------------------------------------------
  msrv:
    name: MSRV check (1.91)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /usr/local/share/powershell \
            /usr/share/swift "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force || true
          echo "After:"; df -h /

      - name: Install Rust 1.91 toolchain
        uses: dtolnay/rust-toolchain@1.91

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv-1-91

      - name: cargo check --workspace
        run: cargo check --workspace --exclude trusty-mpm-gui

  # --------------------------------------------------------------------------
  # search-daemon-smoke: build the trusty-search release binary and verify
  # that the HTTP daemon starts and answers /health with status=ok.
  #
  # Design notes (issue #952):
  #
  # FLAKE AVOIDANCE — issue #865 documented fastembed/ONNX HTTP-429 flake
  # when the model is downloaded at startup. This job avoids that by:
  #   1. TRUSTY_NO_KG=1 — skip knowledge-graph init (no network calls needed).
  #   2. The /health endpoint returns HTTP 200 with status="ok" immediately
  #      once the axum server binds, even while the embedder is still
  #      initialising in the background. The embedder field reports
  #      "initialising" but the HTTP status is always 200 — the smoke check
  #      only needs the server to be reachable, not for the model to be ready.
  #   3. --no-auto-discover — skip the startup project-scan so the daemon does
  #      not walk ~/Projects or ~/code on the ephemeral runner.
  #   4. --data-dir /tmp/ts-smoke — fully isolated data directory so no
  #      indexes.toml, lockfile, or port-file collides with any other process.
  #
  # OPTIONAL — this job is marked continue-on-error: true because:
  #   • It requires a full release build of trusty-search (~15-20 min on cold
  #     cache), which adds significant wall-clock cost on top of the existing
  #     four jobs.
  #   • A timeout/kill race in the ephemeral runner is unlikely but not zero.
  #   • The functional correctness of the daemon is covered by unit + integration
  #     tests in the `test` job; this job only checks that the binary starts and
  #     the HTTP server binds.
  #
  # If flakiness is never observed in practice, remove continue-on-error to
  # make it a hard gate.
  #
  # TEARDOWN — the daemon is killed at the end via the stored PID. This is
  # correct CI behaviour: ephemeral runners are discarded after the job
  # completes, but explicit teardown ensures the port is freed if a later step
  # reuses the runner.
  # --------------------------------------------------------------------------
  search-daemon-smoke:
    name: trusty-search daemon smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /usr/local/share/powershell \
            /usr/share/swift "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force || true
          echo "After:"; df -h /

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: search-daemon-smoke

      # SKIP_UI_BUILD=1 is already set globally via env: at the workflow level.
      # The committed ui-dist/ bundle is used as-is; pnpm is not required.
      - name: Build trusty-search release binary
        run: cargo build --release -p trusty-search

      - name: Start trusty-search daemon (background)
        env:
          # Skip KG init — no network calls, no model downloads at startup.
          TRUSTY_NO_KG: "1"
          # CPU device — explicit to avoid any GPU EP probe on the runner.
          TRUSTY_DEVICE: cpu
          RUST_LOG: "info"
          # GitHub ubuntu-latest runners report ~15.6 GB RAM, just below the
          # 16 GB startup floor. This smoke test only checks HTTP connectivity,
          # not indexing or embedding, so the RAM floor adds no value here.
          TRUSTY_SKIP_RAM_CHECK: "1"
        run: |
          mkdir -p /tmp/ts-smoke
          ./target/release/trusty-search start \
            --foreground \
            --port 7999 \
            --data-dir /tmp/ts-smoke \
            --no-auto-discover \
            > /tmp/ts-smoke/daemon.log 2>&1 &
          echo $! > /tmp/ts-smoke/daemon.pid
          echo "Daemon PID: $(cat /tmp/ts-smoke/daemon.pid)"

      - name: Wait for /health (poll up to 30 s)
        run: |
          PORT=7999
          DEADLINE=$(( $(date +%s) + 30 ))
          until curl -sf "http://127.0.0.1:${PORT}/health" > /tmp/ts-smoke/health.json 2>/dev/null; do
            if [ "$(date +%s)" -ge "${DEADLINE}" ]; then
              echo "--- daemon log ---"
              cat /tmp/ts-smoke/daemon.log || true
              echo "--- end daemon log ---"
              echo "ERROR: /health did not respond within 30 s" >&2
              exit 1
            fi
            sleep 1
          done
          echo "Daemon is up. Health response:"
          cat /tmp/ts-smoke/health.json

      - name: Assert /health returns status=ok
        run: |
          # jq is preinstalled on ubuntu-latest; use it instead of python3 for clarity.
          HEALTH_STATUS=$(jq -r '.status // ""' /tmp/ts-smoke/health.json)
          echo "status field: ${HEALTH_STATUS}"
          if [ "${HEALTH_STATUS}" != "ok" ]; then
            echo "ERROR: /health did not return status=ok (got: ${HEALTH_STATUS})"
            cat /tmp/ts-smoke/health.json
            exit 1
          fi
          echo "OK: status=ok confirmed"

      - name: Tear down daemon
        if: always()
        run: |
          if [ -f /tmp/ts-smoke/daemon.pid ]; then
            PID=$(cat /tmp/ts-smoke/daemon.pid)
            echo "Killing daemon PID ${PID}"
            kill "${PID}" 2>/dev/null || true
          fi
