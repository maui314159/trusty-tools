[package]
name = "trusty-rpc"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "General-purpose CLI for JSON-RPC services (stdio + HTTP). Library code lives in `trusty-common` (feature `rpc`); this crate is the `trpc` binary only."
keywords = ["jsonrpc", "mcp", "cli", "rpc"]
categories = ["command-line-utilities"]
# Why: the library half of this crate has been absorbed into `trusty-common`
# behind the `rpc` feature (issue #5 phase 2a). The binary remains here so the
# `trpc` CLI is still installable, but we don't want to publish a stale crate
# as a duplicate library.
publish = false

[[bin]]
name = "trpc"
path = "src/main.rs"

[dependencies]
trusty-common = { workspace = true, features = ["rpc"] }
anyhow = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["io-util", "io-std", "macros", "rt", "rt-multi-thread", "sync", "process"] }
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["io-util", "io-std", "macros", "rt", "rt-multi-thread", "sync", "process", "net", "time"] }
reqwest = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
