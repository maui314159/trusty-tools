[package]
name        = "trusty-review"
version     = "0.3.3"
edition     = "2024"
rust-version.workspace = true
license-file           = "LICENSE"
authors.workspace      = true
repository.workspace   = true
homepage               = "https://github.com/bobmatnyc/trusty-tools"
readme                 = "README.md"
description            = "Fast local PR-review service for trusty-tools — orchestrates LLM-backed code review"
keywords    = ["code-review", "pr-review", "llm", "openrouter", "github"]
categories  = ["development-tools", "command-line-utilities"]
publish     = true

[[bin]]
name               = "trusty-review"
path               = "src/main.rs"
required-features  = []

[lib]
name = "trusty_review"
path = "src/lib.rs"

[dependencies]
# ── async runtime ──────────────────────────────────────────────────────────
tokio        = { workspace = true }
async-trait  = { workspace = true }
futures-util = { workspace = true }

# ── HTTP (library code only — no axum in lib unconditionally) ──────────────
reqwest      = { workspace = true }
axum         = { workspace = true, optional = true }
tower        = { workspace = true, optional = true }
tower-http   = { workspace = true, optional = true }
tempfile     = { workspace = true }

# ── Serialisation ──────────────────────────────────────────────────────────
serde        = { workspace = true }
serde_json   = { workspace = true }
toml         = { workspace = true }

# ── Regex (JIRA ticket-key extraction, #599) ───────────────────────────────
# Scans PR title + body for `[A-Z][A-Z0-9]+-\d+` ticket keys so the JIRA source
# can do an exact issueKey lookup (parity with code-intelligence's primary path).
regex        = { workspace = true }

# ── Error handling ─────────────────────────────────────────────────────────
# thiserror for library error enums; anyhow used in main.rs binary only.
thiserror    = { workspace = true }
anyhow       = { workspace = true }

# ── Observability ──────────────────────────────────────────────────────────
tracing             = { workspace = true }
tracing-subscriber  = { workspace = true }

# ── Config / paths ─────────────────────────────────────────────────────────
dirs         = { workspace = true }

# ── Dedup + in-flight guards (Phase 1, #582) ───────────────────────────────
# redb: embedded key-value store for the cross-process SHA-keyed dedup claim
#       store (atomic insert-or-fail on (owner,repo,pr,head_sha)).
# dashmap: lock-free concurrent map backing the in-process in-flight guards.
redb         = { workspace = true }
dashmap      = { workspace = true }

# ── CLI (Stage 3) ──────────────────────────────────────────────────────────
clap         = { workspace = true }

# ── Shared workspace utilities ─────────────────────────────────────────────
# The `chat` module of trusty-common exposes the streaming ChatProvider trait
# and OpenRouterProvider.  We drain the stream internally (no feature
# flag needed for the chat module itself, which is compiled unconditionally).
# The `mcp` feature is enabled only under the `mcp` cargo feature of this crate
# (which is on by default) to pull in the JSON-RPC 2.0 stdio loop primitives.
trusty-common = { workspace = true }

# ── JWT / HMAC / crypto (GitHub App auth) ─────────────────────────────────
jsonwebtoken = { workspace = true }
hmac         = { workspace = true }
sha2         = { workspace = true }
hex          = { workspace = true }
base64       = { workspace = true }
chrono       = { workspace = true }

# ── AWS Bedrock (Converse API) ─────────────────────────────────────────────
# Reuses the same versions already pinned by trusty-analyze in [workspace.dependencies].
# aws-sdk-bedrockruntime: Converse (non-streaming) API for LLM calls.
# aws-config: standard credential chain (env / ~/.aws / IAM / SSO).
# aws-types: Region type for region_provider construction.
aws-sdk-bedrockruntime = { workspace = true }
aws-config             = { workspace = true }
aws-types              = { workspace = true }
aws-smithy-types       = { workspace = true }

# ── Contributor profile pipeline (epic #558) ──────────────────────────────
# tga: provides Database, IdentityResolver, AuthorPeriodSummary, diff_for_commit,
# and query_author_period_trends — the data foundation for longitudinal profiling.
tga = { workspace = true }
# rusqlite: needed for direct SQL queries in selector.rs (lookup_by_email etc.)
# and diff_sampler.rs query helpers; uses the same bundled version as tga.
rusqlite = { workspace = true }

# ── Time (Instant for latency measurement) ─────────────────────────────────
# std::time::Instant is sufficient; chrono is used for JWT iat/exp claims.

[features]
# Why: mirrors trusty-analyze / trusty-common convention — axum + tower-http
#      are gated behind `http-server` so `--no-default-features` library
#      consumers (e.g. CLI one-shot, unit tests) do not pull the full HTTP
#      stack.  The webhook server and axum router live in the future `service`
#      module and will be compiled only under this feature.
#
# The feature is defined now even though Stage 1 does not yet implement the
# service module, so downstream consumers can safely write:
#   trusty-review = { features = ["http-server"] }
# without a manifest change in a later stage.
default     = ["http-server", "mcp"]
http-server = ["dep:axum", "dep:tower", "dep:tower-http", "trusty-common/axum-server"]
# Why: gates the MCP stdio JSON-RPC service + the trusty-common MCP primitives
#      behind an opt-in feature so library-only consumers do not pull in the
#      stdio loop.  Enabled by default so `cargo install` and the default binary
#      include it out of the box.
# What: enables `trusty-common/mcp` (Request, Response, run_stdio_loop, etc.)
#       and compiles the `src/mcp/` module.
# Test: `cargo test -p trusty-review --features mcp` covers dispatch/tools tests.
mcp         = ["trusty-common/mcp", "http-server"]

[dev-dependencies]
# test-util enables tokio's paused-clock (`tokio::time::pause`) used by the
# context-orchestrator timeout fail-open test (#550).
tokio        = { workspace = true, features = ["test-util"] }
tempfile     = { workspace = true }
tower        = { workspace = true }
axum         = { workspace = true }
# git2: needed for profile tests that create temp git repos to exercise diff_for_commit.
# rusqlite is in [dependencies] already (needed for selector.rs at runtime).
git2         = { version = "0.20", default-features = false, features = ["vendored-libgit2", "https", "vendored-openssl"] }
# serial_test: run env-mutating tests serially to prevent env-var races across
# parallel test threads (used by selector resolve_db_path tests).
serial_test  = { workspace = true }
