[package]
name = "trusty-common"
version = "0.11.1"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Shared utilities and provider-agnostic streaming chat (ChatProvider, OllamaProvider, OpenRouter, tool-use) for trusty-* projects"
readme = "README.md"
keywords = ["mcp", "utilities", "cli", "openrouter"]
categories = ["command-line-utilities"]
homepage = "https://github.com/bobmatnyc/trusty-tools"

[lib]
crate-type = ["rlib"]

# Candle Metal RSS validation harness (absorbed from trusty-embedder).
# Requires the `embedder-candle` feature to be enabled.
[[bin]]
name = "candle_metal_bench"
path = "src/bin/candle_metal_bench.rs"
required-features = ["embedder-candle"]

# Unified ticketing MCP server (absorbed from trusty-tickets).
# Requires the `tickets` feature to be enabled.
[[bin]]
name = "tickets-mcp"
path = "src/bin/tickets_mcp.rs"
required-features = ["tickets"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["net", "io-util", "io-std", "macros", "rt", "sync", "process", "time"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
# Process RSS / CPU sampling for the shared `sys_metrics` module; the
# `Layer` impl in `log_buffer` also uses tracing-subscriber's `registry`
# feature (enabled in the workspace dep).
sysinfo = { workspace = true }
dirs = { workspace = true }
colored = { workspace = true }
reqwest = { workspace = true }
futures-util = { workspace = true }
axum = { workspace = true, optional = true }
tower-http = { workspace = true, optional = true }
# Optional: enabled by the `rpc` feature for UUID-v4 JSON-RPC request ids.
uuid = { workspace = true, optional = true }
# Optional: enabled by the `embedder` feature (formerly the `trusty-embedder`
# crate). fastembed-rs provides the ONNX-runtime text-embedding pipeline;
# `hf-hub-native-tls` is required so it can fetch the model on first run.
fastembed = { workspace = true, features = ["hf-hub-native-tls"], optional = true }
lru = { workspace = true, optional = true }
parking_lot = { workspace = true, optional = true }
# Optional: enabled by the `embedder-candle` feature (issue #54). Candle is
# an opt-in alternative BERT backend (all-MiniLM-L6-v2) running on Metal or
# CPU, bypassing the ONNX/CoreML jetsam-kill risk on Apple Silicon. Default
# builds keep the fastembed/ORT path unchanged.
candle-core = { workspace = true, optional = true }
candle-nn = { workspace = true, optional = true }
candle-transformers = { workspace = true, optional = true }
hf-hub = { workspace = true, optional = true }
tokenizers = { workspace = true, optional = true }

# Optional: enabled by the `monitor-tui` feature (formerly the
# `trusty-monitor-tui` crate). ratatui + crossterm power the unified
# terminal dashboard for the trusty-search and trusty-memory daemons.
ratatui = { workspace = true, optional = true }
crossterm = { workspace = true, optional = true }

# Optional: enabled by the `symgraph` / `symgraph-parser` features (formerly
# the `trusty-symgraph` crate). The `symgraph` feature pulls in only the
# pure-data contracts surface (`thiserror`, `sha2`) â€” no tree-sitter, no
# `links` conflict. The `symgraph-parser` feature additionally pulls in
# tree-sitter and all grammar crates plus the emitter / editor stack.
thiserror = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }
indexmap = { version = "2", features = ["serde"], optional = true }
similar = { version = "2", features = ["text"], optional = true }
walkdir = { workspace = true, optional = true }
petgraph = { version = "0.8", features = ["serde-1"], optional = true }
tree-sitter = { workspace = true, optional = true }
tree-sitter-rust = { workspace = true, optional = true }
tree-sitter-python = { workspace = true, optional = true }
tree-sitter-javascript = { workspace = true, optional = true }
tree-sitter-go = { workspace = true, optional = true }
tree-sitter-java = { workspace = true, optional = true }
tree-sitter-typescript = { workspace = true, optional = true }
tree-sitter-c = { workspace = true, optional = true }
tree-sitter-cpp = { workspace = true, optional = true }
syn = { version = "2.0", features = ["full"], optional = true }
prettyplease = { version = "0.2", optional = true }
proc-macro2 = { version = "1.0", optional = true }
quote = { version = "1.0", optional = true }
genco = { version = "0.19", optional = true }

# Optional: enabled by the `memory-core` feature (formerly the
# `trusty-memory-core` crate). Memory Palace storage engine â€” HNSW
# vector index (pure-Rust `hnsw_rs`), redb-backed knowledge graph,
# fastembed embeddings, git-history extraction, dream/decay analytics.
# Heavy deps gated behind the feature so downstream crates that only
# want chat / mcp / symgraph pay zero cost.
#
# `usearch` is only pulled in by the opt-in `usearch-migrate` feature
# (issue #51) for the one-shot drain of legacy `.usearch` index files.
# Default builds no longer link the C++ FFI dependency.
usearch = { workspace = true, optional = true }
hex = { workspace = true, optional = true }
hnsw_rs = { workspace = true, optional = true }
rusqlite = { workspace = true, optional = true }
r2d2 = { workspace = true, optional = true }
r2d2_sqlite = { workspace = true, optional = true }
git2 = { workspace = true, optional = true }
dashmap = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }
regex = { workspace = true, optional = true }
kuzu = { workspace = true, optional = true }
redb = { workspace = true, optional = true }
postcard = { workspace = true, optional = true }
# Optional: enabled by the `tickets` feature (absorbed from `trusty-tickets`).
# base64 is used by the JIRA backend for Basic-auth encoding.
base64 = { workspace = true, optional = true }
# Optional: enabled by the `tickets` feature for config-file parsing.
toml = { version = "0.8", optional = true }

# Optional: enabled by the `cli-help` feature. Declarative help-config parsing
# (YAML â†’ `HelpConfig`) plus the "did you mean?" suggester for unknown
# subcommands. Kept off by default so library consumers that only want the
# chat / mcp / symgraph surfaces don't pay the parse cost.
serde_yaml = { workspace = true, optional = true }
strsim = { workspace = true, optional = true }

# Optional: enabled by the `bedrock` feature. AWS Bedrock Converse API
# client â€” provides `BedrockProvider` implementing `ChatProvider`.
aws-config = { workspace = true, optional = true }
aws-sdk-bedrockruntime = { workspace = true, optional = true }
aws-types = { workspace = true, optional = true }

# launchd module is macOS-only and needs getuid(2) for the gui/<uid> domain.
[target.'cfg(target_os = "macos")'.dependencies]
libc = { workspace = true }

# Cross-platform direct ort dep for the `embedder` feature. Pinned to the
# exact version fastembed-rs requires (`=2.0.0-rc.12`). We need ort as a
# direct dep so we can register execution providers at runtime (CoreML on
# Apple Silicon, CUDA when the `embedder-cuda` feature is enabled).
[dependencies.ort]
version = "=2.0.0-rc.12"
default-features = false
features = ["std", "api-24"]
optional = true

# macOS-specific: add the `coreml` feature so the runtime can build a
# CoreML EP on Apple Silicon. Only takes effect when the `embedder`
# feature is enabled (ort is optional).
[target.'cfg(target_os = "macos")'.dependencies.ort]
version = "=2.0.0-rc.12"
default-features = false
features = ["coreml", "std", "api-24"]
optional = true

[dev-dependencies]
toml = "0.8"
tempfile = { workspace = true }

[features]
default = []
# Enables the `server` module: standard axum middleware stack (CORS, trace,
# gzip) and a fast-fail reqwest client for daemon-to-daemon calls.
axum-server = ["dep:axum", "dep:tower-http"]
# Enables the `mcp` module: shared JSON-RPC 2.0 / MCP primitives (formerly the
# `trusty-mcp-core` crate). Pulls in no extra deps beyond `serde` / `tokio`
# which are already required.
mcp = []
# Enables the `rpc` module: general-purpose JSON-RPC client + stdio/HTTP
# transports + pretty-print helpers (formerly the library half of the
# `trusty-rpc` crate). Requires `uuid` for request id generation and reuses
# the workspace `reqwest` for HTTP transport.
rpc = ["dep:uuid"]
# Enables the `embedder` module: shared text-embedding abstraction
# (Embedder trait + FastEmbedder + MockEmbedder), formerly the
# `trusty-embedder` crate. Pulls in fastembed-rs, lru, parking_lot, and
# the ort direct dep. Defaults to bundled ORT linking â€” see the
# `embedder-*` sub-features for AL2023 / CUDA / load-dynamic variants.
embedder = ["dep:fastembed", "dep:lru", "dep:parking_lot", "dep:ort"]
# Enables the `bm25` module: zero-dependency BM25 lexical index +
# code-aware tokenizer (issue #156). Pure `std` + `tracing` â€” no new deps.
bm25 = []
# Enables the `migrations` module: reusable schema-migration kernel
# (`SchemaVersion`, `Migration`, `MigrationRunner`, file-stamp helpers).
# Issue #179. Pure user of existing `serde` / `serde_json` / `anyhow` /
# `tracing` workspace deps â€” adds no new dependencies.
migrations = []
# Enables the `bm25_client` module: a UDS JSON-RPC client for the per-palace
# `trusty-bm25-daemon` subprocess (issue #156). Pure user of existing
# `tokio` / `serde_json` / `anyhow` workspace deps â€” adds no new deps.
bm25-client = []
# Bundle the ONNX Runtime static libs via fastembed's
# `ort-download-binaries-native-tls`. Right choice for macOS and modern
# Linux (glibc â‰Ą 2.38). Mutually exclusive with `embedder-load-dynamic`
# and `embedder-cuda` at the `ort-sys` level.
embedder-bundled-ort = ["embedder", "fastembed/ort-download-binaries-native-tls"]
# GPU-accelerated embedding via ort's CUDA execution provider. Pairs with
# `fastembed/ort-load-dynamic` so no glibc-2.38-bound static ORT binaries
# are bundled. Operators provide a host-compatible `libonnxruntime.so` and
# point to it with `ORT_DYLIB_PATH=/path/to/lib` at runtime.
embedder-cuda = ["embedder", "fastembed/cuda", "fastembed/ort-load-dynamic", "ort/cuda", "ort/load-dynamic"]
# Dynamic ORT loading without CUDA â€” for AL2023 (glibc 2.34) CPU-only
# builds. Set `ORT_DYLIB_PATH` at runtime.
embedder-load-dynamic = ["embedder", "fastembed/ort-load-dynamic", "ort/load-dynamic"]
# Deprecated: CoreML is now auto-detected at runtime on macOS. Kept as a
# no-op alias for backward compatibility.
embedder-coreml = ["embedder"]
# Exposes the `MockEmbedder` test double outside `cfg(test)` so downstream
# integration tests can reuse it.
embedder-test-support = ["embedder"]
# Issue #54: opt-in Candle BERT backend (all-MiniLM-L6-v2 on Metal/CPU). Does
# NOT replace the fastembed/ORT default â€” operators select it at runtime via
# `TRUSTY_EMBEDDER=candle` on builds that compiled this feature in. The
# CandleEmbedder lives in `embedder::candle_embedder` behind a `#[cfg]` gate.
embedder-candle = [
    "embedder",
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:hf-hub",
    "dep:tokenizers",
    # `thiserror` is otherwise gated on the `symgraph` feature; the candle
    # embedder uses it for `CandleEmbedderError`, so we pull it in here.
    "dep:thiserror",
]
# Enables the `symgraph` module's contracts surface (formerly the
# `trusty-symgraph` crate's default surface): pure data types
# (`EntityType` / `RawEntity` / `EdgeKind` / `fact_hash_str` / tables).
# Pulls in `thiserror` and `sha2` only â€” no tree-sitter, no `links`
# conflict. Downstream crates that only need the knowledge-graph data
# shapes (trusty-search, trusty-analyze) enable this feature and stop.
symgraph = ["dep:thiserror", "dep:sha2"]
# Enables the full symgraph parser + emitter + graph stack: tree-sitter
# grammars (Rust, Python, JavaScript, Go, Java, TypeScript, C, C++), the
# `IndexMap`-based `SymbolRegistry`, the deterministic emitter, the
# `SymbolGraph`, editor primitives, and the strategy/locality/
# test-colocation modules. Pulls in the `links = "tree-sitter"` constraint
# â€” only enable in one crate per build graph (typically `open-mpm`).
symgraph-parser = [
    "symgraph",
    "dep:uuid",
    "dep:indexmap",
    "dep:similar",
    "dep:walkdir",
    "dep:petgraph",
    "dep:tree-sitter",
    "dep:tree-sitter-rust",
    "dep:tree-sitter-python",
    "dep:tree-sitter-javascript",
    "dep:tree-sitter-go",
    "dep:tree-sitter-java",
    "dep:tree-sitter-typescript",
    "dep:tree-sitter-c",
    "dep:tree-sitter-cpp",
    "dep:syn",
    "dep:prettyplease",
    "dep:proc-macro2",
    "dep:quote",
    "dep:genco",
]
# Enables the symgraph HTTP server module (axum + tokio). Implies the
# full parser stack.
symgraph-server = ["symgraph-parser", "axum-server"]
# Enables the `memory_core` module: Memory Palace storage engine
# (formerly the `trusty-memory-core` crate). Pulls in usearch (HNSW
# vector index), redb + postcard (knowledge graph + payload/chat stores),
# git2 (git history extraction), and dashmap / chrono / regex /
# parking_lot / thiserror / uuid utilities. Requires the bundled-ORT
# embedder variant by default so FastEmbedder is available; downstream
# consumers can switch to the load-dynamic or CUDA variants by enabling
# `embedder-load-dynamic` / `embedder-cuda` explicitly.
#
# Issue #47: rusqlite / r2d2 / r2d2_sqlite are no longer pulled in by this
# feature â€” all stores migrated to redb (#44, #45, #46, #56, #57). The
# `sqlite-kg` feature still pulls them in for the legacy migration helpers.
memory-core = [
    "dep:hnsw_rs",
    "dep:git2",
    "dep:dashmap",
    "dep:futures",
    "dep:chrono",
    "dep:regex",
    "dep:parking_lot",
    "dep:thiserror",
    "dep:uuid",
    "dep:redb",
    "dep:postcard",
    "dep:petgraph",
    "dep:sha2",
    "dep:hex",
    "embedder",
    "embedder-bundled-ort",
]
# Optional kuzu graph DB read-only integration on top of the memory-core
# feature. Pulls in the `kuzu` crate. Off by default because kuzu adds a
# large native dependency.
memory-core-kuzu = ["memory-core", "dep:kuzu"]
# Issue #51: one-shot drain of legacy `.usearch` index files on palace
# open. Pulls in the `usearch` C++ FFI crate temporarily so operators
# upgrading from the pre-redb backend can migrate without losing data.
# After all production palaces have been upgraded this feature (and the
# `usearch` dep) can be removed entirely.
usearch-migrate = ["memory-core", "dep:usearch"]
# Legacy SQLite KG read path (the pre-#44 backend). Kept compilable so the
# one-shot SQLite â†’ redb migration tool can read old `kg.db` / `recall.db`
# / `payloads.db` / `chat_sessions.db` files. Pulls in rusqlite + r2d2 +
# r2d2_sqlite which are otherwise no longer needed by `memory-core` (#47).
sqlite-kg = [
    "memory-core",
    "dep:rusqlite",
    "dep:r2d2",
    "dep:r2d2_sqlite",
]
# Enables the `monitor` module: the unified ratatui dashboard for the
# trusty-search and trusty-memory daemons (formerly the `trusty-monitor-tui`
# crate, and before that the standalone `trusty-monitor` binary). Pulls in
# ratatui + crossterm; the daemon HTTP clients reuse the `reqwest` already
# required. Consumed via `trusty_common::monitor::run()` by the
# `monitor tui` subcommand of `trusty-search` and `trusty-memory`.
monitor-tui = ["dep:ratatui", "dep:crossterm", "dep:chrono"]
# Enables the `embedder_client` module: HTTP client trait + wire types +
# InProcessEmbedderClient + RemoteEmbedderClient for the `trusty-embedderd`
# standalone process (issue #110 Phase 1). Formerly the `trusty-embedder-client`
# crate (MIT) â€” moved here under Elastic-2.0. Requires `reqwest` (already a
# workspace dep), `async-trait`, and `thiserror` (already workspace deps).
# The `embedder` feature is NOT implied so callers that only need the HTTP
# client path don't pull in fastembed/ORT. Use
# `features = ["embedder-client", "embedder", "embedder-bundled-ort"]` to get
# both the in-process and remote paths.
# Note: module name is `embedder_client` (with `er`) to distinguish from the
# existing `embed_client` (UDS, PR #157). Issue #164 will reconcile them.
embedder-client = ["dep:thiserror", "embedder"]
# Enables the `tickets` module: unified ticketing MCP server with GitHub,
# JIRA, and Linear backends (absorbed from the former standalone `trusty-tickets`
# crate). Pulls in `chrono`, `uuid`, `base64`, `thiserror`, and `toml` as
# additional optional deps. Requires the `mcp` feature for the stdio loop.
tickets = ["mcp", "dep:chrono", "dep:uuid", "dep:base64", "dep:thiserror", "dep:toml"]
# Enables the `help` module: declarative CLI help loader (`HelpConfig` parsed
# from a per-binary `help.yaml` bundled via `include_str!`), the canonical
# `render_help` formatter, and a Jaro-Winkler-based `suggest("did you mean?")`
# helper consumed by each binary's unknown-subcommand error path. Pulls in
# `serde_yaml`, `strsim`, `indexmap`, and `thiserror` (all otherwise optional).
# Issue #216.
cli-help = ["dep:serde_yaml", "dep:strsim", "dep:indexmap", "dep:thiserror"]
# Enables the `update` module: throttled crates.io update-notification helper.
# Checks once per 24 h via a JSON cache file in the OS cache directory. Opt-out
# via `TRUSTY_NO_UPDATE_CHECK` or `CI` environment variables. Reuses the
# unconditional `reqwest`, `serde`, `serde_json`, `dirs`, and `tracing` deps â€”
# the feature flag controls module compilation only, adding zero new transitive
# dependencies to builds that enable it.
update-check = []
# Enables the `error_capture` module: tracing Layer that taps ERROR-level
# events into a bounded ring buffer + local JSONL store for consent-gated
# bug reporting (Phase 1 of #479). Captures fingerprinted error records with
# crate attribution, code location, OS/arch, and a dedup SHA-256 fingerprint.
# Opt-out via `TRUSTY_NO_BUG_CAPTURE` env var. Additive â€” does not change
# stderr logging behaviour. Requires `sha2` (already an optional workspace
# dep via `symgraph`); enables it unconditionally for this feature.
# Default builds that do NOT enable `bug-capture` pull in zero new deps.
bug-capture = ["dep:sha2"]
# Enables the `chat::BedrockProvider`: AWS Bedrock `Converse` API backend
# for the `ChatProvider` trait. Pulls in `aws-config` (credential chain) and
# `aws-sdk-bedrockruntime` (Converse SDK). Auth via the standard AWS credential
# chain (env vars, ~/.aws/credentials, IAM roles, SSO) â€” no API key required.
# Without this feature, `BedrockProvider::new` returns a clear error message
# instructing the operator to rebuild with `--features bedrock`.
bedrock = ["dep:aws-config", "dep:aws-sdk-bedrockruntime", "dep:aws-types"]
