[package]
name = "trusty-symgraph"
version = "0.2.6"
edition.workspace = true
authors.workspace = true
description = "Deprecated re-export shim: the symbol-graph engine moved into `trusty-common` behind the `symgraph` / `symgraph-parser` features."
license = "Apache-2.0 OR MIT"
repository.workspace = true
readme = "README.md"
keywords = ["ast", "symbol-graph", "code-analysis", "tree-sitter"]
categories = ["development-tools"]
homepage = "https://github.com/bobmatnyc/trusty-tools"
publish = false

[lib]
name = "trusty_symgraph"
path = "src/lib.rs"
crate-type = ["rlib"]

[[bin]]
name = "trusty-symgraph"
path = "src/bin/serve.rs"
required-features = ["server"]

[dependencies]
# Absorbed into trusty-common (issue #5 phase 2c). The shim crate keeps the
# `trusty_symgraph::*` import path alive for downstream code that hasn't
# migrated yet.
trusty-common = { workspace = true, features = ["symgraph"] }
tokio = { workspace = true, optional = true }

[features]
default = []
# Forward to the new feature surface in trusty-common.
parser = ["trusty-common/symgraph-parser"]
server = ["parser", "trusty-common/symgraph-server", "dep:tokio"]

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full"] }
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
