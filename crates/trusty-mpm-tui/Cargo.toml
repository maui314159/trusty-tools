[package]
name = "trusty-mpm-tui"
version.workspace = true
publish = false
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "ratatui dashboard for monitoring trusty-mpm sessions and agents"

[lib]
name = "trusty_mpm_tui"
path = "src/lib.rs"

[[bin]]
name = "trusty-mpm-tui"
path = "src/main.rs"

[dependencies]
trusty-mpm-core.workspace = true
trusty-mpm-client.workspace = true
tokio.workspace = true
anyhow.workspace = true
ratatui.workspace = true
crossterm.workspace = true
clap.workspace = true
# The coordinator-context poll parses session UUID strings back into SessionId.
uuid.workspace = true
# The health screen ([2]) polls trusty-search and trusty-memory `/health`
# endpoints directly over HTTP and deserializes the JSON payloads.
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
# The health screen renders "Xh ago" relative timestamps for each index's
# last-indexed time; chrono parses the RFC 3339 strings returned by
# `GET /indexes/:id/status` and computes deltas against `Utc::now()`.
chrono.workspace = true
# Service start/stop actions log their outcome to stderr via tracing.
tracing.workspace = true
