[agent]
name = "izzie"
role = "assistant"
runner = "claude-code"
model = "claude-sonnet-4-6"
description = "Izzie — personal assistant"
display_name = "Izzie"
prompt_label = "Izzie"

[llm]
temperature = 0.7
# Conversational assistant — short replies by default.
max_tokens = 1024
use_anthropic_direct = false
# Conversational mode (#feature-A): block markdown headers and divider rules
# from appearing mid-response so replies stay in plain prose.
stop_sequences = ["\n##", "\n* * *"]
# Note: "\n---\n" intentionally excluded — qwen3 uses HR dividers naturally in
# conversational output; including it caused mid-sentence truncation (#eval-qwen3)

[tools]
# Curated tool surface mirrored from personal-assistant.toml — Izzie is the
# friendly day-to-day voice and benefits from the same MCP / git / granola
# read access that lets her answer schedule and lookup questions.
allow = [
  # management
  "mcp_list", "mcp_enable", "mcp_disable",
  # git
  "git_log", "git_status",
  # granola
  "granola_*",
  # web search
  "web_search",
  # gworkspace — Gmail
  "compose_email",
  "download_gmail_attachment",
  "format_email_content",
  "get_gmail_message_content",
  "list_message_attachments",
  "manage_gmail_filters",
  "manage_gmail_labels",
  "manage_gmail_settings",
  "modify_gmail_messages",
  "search_gmail_messages",
  # gworkspace — Calendar
  "manage_calendars",
  "manage_events",
  "query_free_busy",
  # gworkspace — Drive
  "get_drive_file_content",
  "list_drive_contents",
  "list_shared_drives",
  "manage_drive_file",
  "manage_file_permissions",
  "search_drive_files",
  "sync_drive",
  # gworkspace — Docs
  "append_to_document",
  "apply_table_style",
  "convert_document",
  "create_document",
  "create_document_from_template",
  "create_document_tab",
  "create_list_in_document",
  "delete_range_in_document",
  "find_tables_in_document",
  "format_document_range",
  "format_paragraph_in_document",
  "get_document",
  "get_document_named_styles",
  "get_document_structure",
  "insert_image_in_document",
  "insert_table_in_document",
  "insert_text_in_document",
  "manage_document_comments",
  "manage_document_header_footer",
  "manage_document_tabs",
  "manage_table_structure",
  "move_paragraph_in_document",
  "publish_markdown_to_doc",
  "render_mermaid_to_doc",
  "replace_text_in_document",
  "set_document_style",
  "update_document_named_styles",
  # gworkspace — Sheets
  "format_sheet",
  "get_spreadsheet",
  "manage_spreadsheet",
  "modify_sheet_values",
  "set_table_column_widths",
  # gworkspace — Slides
  "add_slide_content",
  "format_slide",
  "get_slides",
  "manage_slides",
  # gworkspace — Tasks
  "manage_task_lists",
  "manage_tasks",
  # gworkspace — misc
  "create_chart",
  "list_accounts",
]
# OpenRPC (https://spec.open-rpc.org/) over stdio scopes (#455, #454). Izzie is the
# persistent personal-assistant face; she remembers facts about Masa (memory.write)
# and recalls them (memory.read), benefits from search.read to surface notes/snippets,
# and uses google.* for Gmail/Calendar/Drive when the gworkspace endpoint is enabled.
scopes = ["memory.read", "memory.write", "search.read", "google.*"]

[system_prompt]
# Skills are resolved by name from the global skill registry. Each
# of these has a corresponding `.trusty-agents/skills/<name>.md` file.
# #482: The system prompt body now lives in persona.md (MD-package format).
skills = [
    "izzie-weather",
    "izzie-metro-north",
    "cto-bob-voice",
    "gworkspace-gmail",
    "gworkspace-calendar",
    "gworkspace-drive",
    "trusty-memory-openrpc",
]
