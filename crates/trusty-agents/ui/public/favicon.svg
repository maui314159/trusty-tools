<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- rounded square background -->
  <rect width="32" height="32" rx="6" fill="#3B4CCA"/>
  <!-- antenna -->
  <line x1="16" y1="2" x2="16" y2="7" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="2" r="1.5" fill="#fff"/>
  <!-- face -->
  <rect x="5" y="8" width="22" height="18" rx="4" fill="none" stroke="#fff" stroke-width="1.5"/>
  <!-- eyes -->
  <circle cx="11" cy="15" r="2" fill="#fff"/>
  <circle cx="21" cy="15" r="2" fill="#fff"/>
  <!-- >_ mouth -->
  <text x="9" y="23" font-family="monospace" font-size="7" fill="#fff" font-weight="bold">&gt;_</text>
</svg>
