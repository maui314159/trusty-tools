name: CI
on: [push, pull_request]
jobs:
  ui-dist-check:
    name: Verify ui-dist is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Build Svelte UI
        working-directory: ui
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install
          fi
          pnpm build
      - name: Diff ui/dist against ui-dist
        run: |
          if diff -rq --exclude="*.map" ui/dist ui-dist; then
            echo "ui-dist is up to date"
          else
            echo "ERROR: ui-dist is stale. Run 'make release-prep' and commit the result." >&2
            exit 1
          fi
  ci:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Remove local [patch.crates-io] overrides (CI uses published crates)
        run: |
          python3 - <<'EOF'
          import re
          content = open("Cargo.toml").read()
          content = re.sub(
              r"\[patch\.crates-io\].*?(?=\n\[|\Z)",
              "",
              content,
              flags=re.DOTALL,
          )
          open("Cargo.toml", "w").write(content)
          EOF
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove local [patch.crates-io] overrides (CI uses published crates)
        run: |
          python3 - <<'EOF'
          import re
          content = open("Cargo.toml").read()
          content = re.sub(
              r"\[patch\.crates-io\].*?(?=\n\[|\Z)",
              "",
              content,
              flags=re.DOTALL,
          )
          open("Cargo.toml", "w").write(content)
          EOF
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install --path . --locked
      - run: trusty-search --version
