# Publishes the trusty-search crate to crates.io.
#
# Triggered by:
#   - Push of a tag matching v* (e.g. v0.3.26)
#   - Manual workflow_dispatch (with optional dry-run mode)
#
# Note: trusty-search is a single-crate repo (lib + bin) since v0.3.0.
# The previous multi-crate workspace (trusty-search-core / -service / -mcp)
# was consolidated in v0.3.0; those sub-crate names no longer exist.
#
# Cross-repo dependency:
#   trusty-search depends on trusty-common crates (trusty-embedder,
#   trusty-mcp-core, trusty-common, trusty-symgraph). Ensure those are
#   published to crates.io before running this workflow with updated
#   version pins.
#
# Required repository secret:
#   CARGO_REGISTRY_TOKEN — crates.io API token with publish scope.

name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (publish --dry-run, skip actual upload)"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: Publish trusty-search to crates.io
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove local [patch.crates-io] overrides (CI uses published crates)
        run: |
          python3 - <<'EOF'
          import re
          content = open("Cargo.toml").read()
          content = re.sub(
              r"\[patch\.crates-io\].*?(?=\n\[|\Z)",
              "",
              content,
              flags=re.DOTALL,
          )
          open("Cargo.toml", "w").write(content)
          EOF

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      # ── Quality gate ──────────────────────────────────────────────────────
      - name: Clippy (all targets)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      # ── Publish ───────────────────────────────────────────────────────────
      # Note: [patch] overrides in Cargo.toml are stripped above — cargo
      # publish uses the crates.io versions of trusty-common crates directly.

      - name: Publish trusty-search
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run --allow-dirty
          else
            cargo publish --no-verify --allow-dirty
          fi
