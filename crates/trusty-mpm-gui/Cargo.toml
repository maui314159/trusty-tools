[package]
name = "trusty-mpm-gui"
version = "0.2.12"
edition = "2024"
rust-version = "1.88"
description = "Tauri + web dashboard for trusty-mpm fleet management"
publish = false

[lib]
name = "trusty_mpm_gui"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "trusty-mpm-gui"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# Tauri is not in [workspace.dependencies]; pinned locally.
tauri = { version = "2", features = [] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
# Workspace `reqwest` is a feature superset (`stream` added on top of
# `json` + `rustls-tls`); the extra is harmless for the GUI client.
reqwest = { workspace = true }
anyhow = { workspace = true }
