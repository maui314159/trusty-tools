<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trusty Console</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }
      h1 {
        font-size: 2rem;
        font-weight: 700;
        margin: 0 0 0.25rem;
        background: linear-gradient(135deg, #7c3aed, #2563eb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle { color: #94a3b8; margin: 0 0 2rem; }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1rem;
      }
      .card {
        background: #1e2130;
        border: 1px solid #2d3348;
        border-radius: 0.75rem;
        padding: 1.25rem;
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }
      .name { font-size: 1.1rem; font-weight: 600; margin: 0; }
      .badge {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.2rem 0.6rem;
        border-radius: 9999px;
        border: 1px solid;
        white-space: nowrap;
      }
      .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
      .card-body p { margin: 0.3rem 0; font-size: 0.85rem; color: #94a3b8; }
      code {
        font-family: monospace;
        font-size: 0.8rem;
        background: #0f1117;
        padding: 0.1rem 0.35rem;
        border-radius: 0.25rem;
        color: #e2e8f0;
      }
      a { color: #7c3aed; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .loading, .error { padding: 1.5rem; border-radius: 0.5rem; background: #1e2130; color: #94a3b8; }
      .error { color: #f87171; }
      #status { color: #94a3b8; font-style: italic; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Trusty Console</h1>
        <p class="subtitle">Service status overview</p>
      </header>
      <div id="app">
        <div class="loading" id="status">Detecting services&hellip;</div>
        <div class="cards" id="cards"></div>
      </div>
    </main>
    <script>
      const STATUS_LABELS = { running: 'Running', available: 'Available', absent: 'Absent' };
      const STATUS_COLORS = { running: '#22c55e', available: '#f59e0b', absent: '#64748b' };

      function renderCard(s) {
        const color = STATUS_COLORS[s.status] || '#94a3b8';
        const label = STATUS_LABELS[s.status] || s.status;
        let body = `<p class="id">ID: <code>${s.id}</code></p>`;
        if (s.version) body += `<p class="version">Version: <code>${s.version}</code></p>`;
        if (s.url) body += `<p class="url"><a href="${s.url}" target="_blank" rel="noopener noreferrer">${s.url}</a></p>`;
        if (s.status === 'absent') body += `<p style="font-style:italic;color:#94a3b8;">Install with <code>cargo install ${s.id}</code></p>`;
        else if (s.status === 'available') body += `<p style="font-style:italic;color:#94a3b8;">Binary found but daemon is not running.</p>`;
        return `<div class="card">
          <div class="card-header">
            <h2 class="name">${s.display_name}</h2>
            <span class="badge" style="background:${color}22;color:${color};border-color:${color}44;">
              <span class="dot" style="background:${color};"></span>${label}
            </span>
          </div>
          <div class="card-body">${body}</div>
        </div>`;
      }

      fetch('/api/console/services')
        .then(r => r.ok ? r.json() : Promise.reject('HTTP ' + r.status))
        .then(services => {
          document.getElementById('status').style.display = 'none';
          document.getElementById('cards').innerHTML = services.map(renderCard).join('');
        })
        .catch(err => {
          document.getElementById('status').className = 'error';
          document.getElementById('status').textContent = 'Failed to load services: ' + err;
        });
    </script>
  </body>
</html>
