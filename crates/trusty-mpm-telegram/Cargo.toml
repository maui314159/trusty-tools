[package]
name = "trusty-mpm-telegram"
version.workspace = true
publish = false
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Telegram bot for remote management of the trusty-mpm daemon"

[lib]
name = "trusty_mpm_telegram"
path = "src/lib.rs"

[[bin]]
name = "trusty-mpm-telegram"
path = "src/main.rs"

[dependencies]
trusty-mpm-core.workspace = true
trusty-mpm-client.workspace = true
tokio.workspace = true
tokio-util.workspace = true
reqwest.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
teloxide.workspace = true
clap.workspace = true

[dev-dependencies]
# The daemon's real `api::router` + `DaemonState` are reused to drive
# deterministic in-process HTTP tests (no live daemon needed).
trusty-mpm-daemon = { path = "../trusty-mpm-daemon" }
axum.workspace = true
tempfile.workspace = true
