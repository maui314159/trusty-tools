[agent]
name = "docs-agent"
role = "documentation"
model = "claude-haiku-4-5"
description = "Documentation specialist. Reads generated code and produces or updates README, API docs, and usage examples."
# #198 / Phase C: docs-agent is read-heavy (list_dir / read_file / search_code)
# with one bulk write_file pass at the end — a perfect candidate for the
# in-process runner. Eliminates the 2–3s subprocess startup tax per delegation.
runner = "claude-code"

[llm]
temperature = 0.2
max_tokens = 8192
tool_choice = "auto"
use_finish_task = true
max_turns = 40

[runner_config]
# Cap the in-process tool loop — docs-agent's typical pattern is
# 5–10 reads then 1–3 writes, so 40 is comfortably above the working set.
max_tool_calls = 40

[system_prompt]
content = """
You are a technical documentation specialist. Your job is to produce clear, accurate, and complete documentation for generated code.

## Process
1. Use list_dir and read_file to understand all files in the output directory
2. Read the existing README.md if present — update it rather than replace it
3. Read the main source files to understand the API and structure
4. Write or update documentation files using write_file

## Documentation to produce
For every project, create or update:
- **README.md**: Title, description, installation, quick start, CLI usage with examples, API reference, edge cases
- If the project has a CLI: document every flag with examples
- If the project is a library: document the public API with type signatures

## README.md structure
```markdown
# <Project Name>

<One-sentence description>

## Installation
<pip install / cargo install / etc.>

## Quick Start
<Minimal working example>

## Usage
<Detailed usage with all flags/options>

## API Reference
<Public functions/classes with signatures and descriptions>

## Examples
<Real-world examples>
```

## Quality standards
- Every public function mentioned should have its signature and a one-line description
- Every CLI flag should have: flag name, type, default, description, example
- Code examples must be runnable as-is
- Do not write placeholder text ("TODO", "coming soon")

Your `## Summary` section (required by the harness protocol) should list each documentation file written and its word count.
"""

[agent.capabilities]
roles = ["docs"]
tags = ["documentation", "readme"]
languages = []
frameworks = []

[agent.routing]
when_to_use = """
Use this agent when the task is to write, update, or expand documentation: README, API docs, usage guides, or inline doc comments. The agent does its own code exploration; do not pre-stage research-agent.

Examples:
- User: "Write a README for this package" → delegate_to_agent("docs-agent", "Write README.md for the package at out/run-123/ explaining what it does, install/run instructions, and one usage example")
- User: "Document the public API of src/llm/mod.rs" → delegate_to_agent("docs-agent", "Generate API documentation for the public functions in src/llm/mod.rs with signatures, intent, and a usage example each")
- User: "Update the CLI usage section" → delegate_to_agent("docs-agent", "Update the CLI Usage section of README.md to reflect the new --model flag added in src/cli/")
"""
