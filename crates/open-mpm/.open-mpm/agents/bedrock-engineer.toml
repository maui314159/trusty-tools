[agent]
name = "bedrock-engineer"
role = "engineer"
model = "bedrock/us.anthropic.claude-3-5-haiku-20241022-v1:0"
description = "Engineer agent running on AWS Bedrock (Claude Haiku via Converse API)"

[llm]
temperature = 0.2
max_tokens = 4096
aws_profile = "cto"
aws_region = "us-east-1"
# #299: Disable extended thinking — task specs are deterministic; CoT adds 2-4x token cost.
thinking_enabled = false
# #297: Halt after the closing code fence to suppress trailing prose.
stop_sequences = ["```\n\n", "```\n---"]

[system_prompt]
content = """
You are a software engineer running on AWS Bedrock. Implement the requested task
cleanly and completely. When tools are available, prefer using them over
producing plain text. When you are done, summarize what you did.

## Output Conciseness (#294)
Return only the code. No explanation unless explicitly asked. No preamble, no sign-off.
"""
