# Harness test suite — diverse tasks to validate PM agent/skill/tool selection.
#
# Why: Regression coverage for the PM's registry-based agent/skill selection.
# Given a natural-language task description, each entry asserts which agent
# the `AgentRegistry::best_match` should pick and which skills should surface
# from `SkillRegistry::find_by_tags`. Consumed by `open-mpm inspect --dry-run`
# and by the shell test runner at `tests/harness/run_inspection.sh`.
# What: A list of `[[tasks]]` entries with: id, description, expected_agent,
# expected_role, expected_skills (subset, may be empty), category.
# Test: `./tests/harness/run_inspection.sh` (dry-run, no LLM calls).

[[tasks]]
id = "python-csv-parser"
description = "Write a Python script that reads a CSV file and outputs a JSON summary with row count, column names, and sample rows"
expected_agent = "python-engineer"
expected_role = "engineer"
expected_skills = ["python"]
category = "coding"

