version: "1.0"

repositories:
  - name: "my-app"
    path: "/path/to/my-app"
    branch: "main"
  - name: "my-backend"
    path: "/path/to/my-backend"
    branch: "main"

# Optional: load developer aliases from a shared external file.
# Entries from this file are merged with the inline `developer_aliases`
# block below. For overlapping canonical names, the external file wins.
# Relative paths resolve against the directory containing this config.
aliases_file: "./example-aliases.yaml"

developer_aliases:
  # Inline aliases still supported; useful for per-project overrides.
  "Alice Smith":
    - "alice@example.com"
    - "alice.smith@work.com"

classification:
  rules_file: "./configs/my-rules.yaml"  # optional

output:
  directory: "./reports"
  formats:
    - csv
    - json
    - markdown

# GitHub integration (optional, required to populate the `pull_requests` table).
#
# Without this block, `tga collect` skips PR fetching entirely and
# `tga pr-metrics` returns no data (issue #211). The minimum to enable PR
# sync is `token` + `fetch_prs: true` + (`repo` OR `org`).
#
# Required token scopes:
#   - `public_repo` for public repositories only
#   - `repo`        for private repositories
#
# The token can be inlined here (not recommended) or sourced from the
# `GITHUB_TOKEN` env var by leaving `token` unset.
github:
  token: "${GITHUB_TOKEN}"
  # Either single-repo mode:
  repo: "my-org/my-app"
  # Or org-wide mode (drives PR fetch from the entries in `repositories[]`):
  # org: "my-org"
  fetch_prs: true

# Linear project management integration (optional).
# Enriches commits that reference Linear issue IDs (e.g. ENG-123) with
# title, status, team, and assignee from the Linear GraphQL API.
linear:
  api_key: "${LINEAR_API_KEY}"
  team_keys:
    - "ENG"
    - "FE"
  fetch_on_reference: true

# DORA metrics configuration (issues #207, #208, #212, #213).
#
# Drives `tga deployments collect`, `tga incidents collect`, and
# `tga dora`. The default `deployment_source: git_tags` works against
# any local checkout without external credentials — flip the tag regex
# to match your release convention.
dora:
  deployment_source: git_tags
  deployment_tag_pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.\-]+)?$'
  production_branch: main
  # Per-signal: a commit matching `work_type` (classification category)
  # OR `commit_message_pattern` within `within_hours` of a deploy counts
  # as a change-failure-rate event.
  failure_signals:
    - work_type: bug_fix
      on_branch: main
      within_hours: 48
    - commit_message_pattern: '(?i)(hotfix|rollback|revert)'
      within_hours: 24
  # Optional: directory of Datadog incident exports (.json). When set,
  # `tga incidents collect` will iterate the directory. The Datadog
  # parser is currently a stub — see src/commands/incidents.rs.
  # datadog_dir: "./datadog-exports/"

# JIRA project key → work type mappings (issue #206). The JIRA tier
# fires before the regex tier so these outrank the generic
# `jira-ticket` rule (which routes everything to "feature/ticketed").
jira:
  jira_project_mappings:
    TQL: bug_fix
    APEX: integration
    INFRA: platform_infrastructure
    SEC: security
  # jira_project_mapping_confidence: 0.88   # optional, default 0.88
