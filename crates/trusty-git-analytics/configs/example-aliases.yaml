# Example external developer aliases file.
#
# This format is compatible with the Python predecessor (gitflow-analytics)
# so files generated there can be consumed unchanged. Reference it from a
# config via the top-level `aliases_file:` key.
#
# Required fields per entry: `name`, `primary_email`.
# Optional fields: `aliases`, `github_username`, `confidence`, `reasoning`.

developers:
  - name: "John Doe"
    primary_email: "john.doe@company.com"
    aliases:
      - "jdoe@gmail.com"
      - "john.doe@oldcompany.com"
      - "John D."
    github_username: "jdoe"
    confidence: 1.0
    reasoning: ""

  - name: "Alice Smith"
    primary_email: "alice@company.com"
    aliases:
      - "alice.smith@personal.com"
      - "asmith"
    github_username: "asmith"

  - name: "Bob Matsuoka"
    primary_email: "bob@matsuoka.com"
    aliases:
      - "bobmatnyc@users.noreply.github.com"
    github_username: "bobmatnyc"
