# Cross-compilation release workflow.
#
# Triggered on `v*` tag pushes (the `cd.yml` workflow creates these tags
# automatically on merges to `main`). Builds the `tga` binary for four
# targets, packages each as a `.tar.gz`, computes per-asset SHA256 hashes,
# and uploads everything as GitHub Release assets.
#
# Linux musl targets use `cross` so they remain fully static (no glibc
# dependency on the host runner). macOS targets build natively on
# Apple-hosted runners.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BINARY_NAME: tga

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux musl only)
        if: matrix.use_cross == true
        run: cargo install cross --locked --version 0.2.5

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin "$BINARY_NAME"
          else
            cargo build --release --target ${{ matrix.target }} --bin "$BINARY_NAME"
          fi

      - name: Package archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          STAGING="${BINARY_NAME}-${VERSION}-${TARGET}"
          mkdir -p "$STAGING"
          cp "target/${TARGET}/release/${BINARY_NAME}" "$STAGING/"
          # Include user-facing docs in the tarball when available.
          for f in README.md LICENSE CHANGELOG.md; do
            [ -f "$f" ] && cp "$f" "$STAGING/" || true
          done
          tar -czf "${STAGING}.tar.gz" "$STAGING"
          # Compute SHA256 (works on both linux and macOS runners).
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          else
            shasum -a 256 "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          fi
          echo "archive=${STAGING}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256=${STAGING}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.sha256 }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -print -exec cp {} release-assets/ \;
          # Combine all sha256 files into a single SHA256SUMS file as well.
          (cd release-assets && cat *.sha256 > SHA256SUMS)
          ls -la release-assets

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
