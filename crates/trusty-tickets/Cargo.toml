[lib]
crate-type = ["rlib"]

[[bin]]
name = "tickets-mcp"
path = "src/bin/tickets-mcp.rs"

[dependencies]
trusty-mcp-core = { path = "../trusty-mcp-core", version = "0.1.2" }
trusty-common = { path = "../trusty-common", version = "0.3.3" }
anyhow = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
reqwest = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
base64 = { workspace = true }
uuid = { workspace = true }
dirs = { workspace = true }
toml = { workspace = true }
