# Pre-commit hooks configuration for claude-mpm
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(.*\.md|.*\.txt)$
      - id: end-of-file-fixer
        exclude: ^(.*\.md|.*\.txt)$
      - id: check-yaml
        args: ['--unsafe']  # Allow custom YAML tags
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Secret detection with detect-secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            venv/.*|
            \.venv/.*|
            node_modules/.*|
            \.git/.*|
            __pycache__/.*|
            .*\.lock|
            .*package-lock\.json|
            .*pnpm-lock\.yaml|
            .*Cargo\.lock|
            .*\.pyc
          )$

  # Commitizen for conventional commits
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Ratcheted 500-line file-size cap (issue #610). Fails the commit when a new
  # tracked .rs file exceeds 500 lines, or an allowlisted file grows past its
  # frozen budget, or an allowlisted file dropped <= 500 (remove its entry).
  # Runs against the whole tracked tree (pass_filenames: false) so the
  # allowlist ratchet is evaluated holistically, not just on staged paths.
  - repo: local
    hooks:
      - id: line-cap
        name: 500-line file-size cap (ratcheted allowlist)
        entry: scripts/check_line_cap.sh
        language: system
        pass_filenames: false
        always_run: true

  # Empirical commit-effort scoring — appends Effort/Effort-Score/
  # Effort-Breakdown trailers to commit messages. Non-destructive: never
  # blocks a commit; computation failures log a warning and exit 0.
  # See docs/research/commit-effort-spec-*.md for the formula and thresholds.
  - repo: local
    hooks:
      - id: insert-effort-trailers
        name: Insert commit-effort trailers
        entry: scripts/insert-effort-trailers.sh
        language: script
        stages: [prepare-commit-msg]
        # Don't run for merge / squash sources (the hook itself also detects
        # these via $2, but excluding them here saves the shell invocation).
        always_run: true
        pass_filenames: false
        # prepare-commit-msg passes the message-file path as the first
        # positional argument; pre-commit's "args" injects extra args after
        # any hook-framework-supplied ones, so we leave args empty here.

# Configuration for specific file types
exclude: |
  (?x)^(
    venv/.*|
    \.venv/.*|
    env/.*|
    \.env/.*|
    build/.*|
    dist/.*|
    \.git/.*|
    __pycache__/.*|
    .*\.pyc|
    .*\.pyo|
    .*\.egg-info/.*|
    \.coverage|
    \.pytest_cache/.*|
    \.mypy_cache/.*|
    node_modules/.*|
    \.DS_Store|
    \.vscode/.*|
    \.idea/.*
  )$

# Global settings
default_stages: [pre-commit]
fail_fast: false
